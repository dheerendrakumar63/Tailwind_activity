<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-slate-100">
    <div class="mx-auto mt-20 max-w-lg overflow-hidden rounded-lg bg-white shadow-lg">
        <div class="flex h-20 items-center justify-center bg-gradient-to-r from-cyan-500 to-blue-500 text-xl font-bold text-white">
            News you can Trust
        </div>

        <div class="px-8 py-6 text-center">
            <h3 class="text-2xl font-bold text-slate-900">Stay up to date with the Latest</h3>
            <p class="mt-2 text-slate-600">Subscribe to our newsletter for the latest news straight into your inbox.</p>

            <form class="mt-6 flex flex-col gap-3">
                <input
                    class="rounded-md border border-slate-300 px-4 py-2 text-slate-900 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                    type="email"
                    placeholder="your@email.com"
                />
                <button class="rounded-md bg-blue-600 px-4 py-2 font-semibold text-white hover:bg-blue-700">
                    Subscribe Now
                </button>
            </form>

            <p class="mt-4 text-sm text-slate-500">We value your privacy.</p>
        </div>
    </div>
</body>
</html>
